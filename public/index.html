<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eternal Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Join modal ──────────────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <canvas id="ambient-canvas"></canvas>
    <div id="modal">
      <div id="modal-eyebrow">Eternal Canvas</div>
      <h1>A space to<br>create together.</h1>
      <p>Draw, write, explore — with anyone who has the link. Your canvas persists.</p>
      <div id="name-input-wrap">
        <input id="name-input" type="text" maxlength="32" placeholder="your name" autocomplete="off" />
      </div>
      <button id="join-btn">Enter Canvas</button>
      <div id="modal-hint">
        pan &nbsp;·&nbsp; space + drag &nbsp;&nbsp;
        zoom &nbsp;·&nbsp; scroll wheel &nbsp;&nbsp;
        reset &nbsp;·&nbsp; R
      </div>
    </div>
  </div>

  <!-- ── Main app ────────────────────────────────────────────────────────── -->
  <div id="app" class="hidden">
    <div id="main">

      <!-- Canvas area -->
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <canvas id="cursors"></canvas>

        <!-- Floating pill toolbar -->
        <div id="toolbar">
          <div id="tools">
            <button class="tool-btn active" id="tool-brush" title="Brush  (B)">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M2 14c1-1 2.5-1 3.5-2L13 4.5a1.5 1.5 0 0 0-2-2L3 10c-1 1-1 2.5-2 3.5z" stroke="currentColor"
                  stroke-width="1.4" stroke-linejoin="round" />
                <circle cx="2.8" cy="13.2" r="1.2" fill="currentColor" opacity=".55" />
              </svg>
            </button>
            <button class="tool-btn" id="tool-text" title="Text  (T)">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M3 4h10M8 4v9M5.5 13h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <div class="divider"></div>

          <div id="brush-controls">
            <label id="color-wrap" title="Colour">
              <input id="color-picker" type="color" value="#000000" />
              <span id="color-swatch"></span>
            </label>
            <input id="size-slider" type="range" min="1" max="1" value="1" />
            <span id="size-label">1</span>
          </div>

          <div class="divider"></div>

          <div id="user-badge">
            <span id="user-dot" class="dot"></span>
            <span id="user-name-display"></span>
          </div>
        </div>

        <!-- Zoom restriction hint -->
        <div id="zoom-hint">zoom in to draw</div>

        <!-- Minimap -->
        <canvas id="minimap" title="Click to jump to location"></canvas>

        <!-- Viewport HUD -->
        <div id="viewport-hud">
          <span id="coords">0, 0</span>
          <span id="zoom-label">100%</span>
        </div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <span>Eternal Canvas</span>
        </div>

        <section id="users-section">
          <h2>Online</h2>
          <ul id="user-list"></ul>
        </section>

        <section id="chat-section">
          <h2>Messages</h2>
          <div id="chat-messages"></div>
          <div id="chat-input-wrap">
            <input id="chat-input" type="text" maxlength="500" placeholder="say something…" autocomplete="off" />
            <button id="chat-send" title="Send">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                <path d="M7 12V2M7 2L3 6M7 2L11 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </section>
      </aside>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>

</html>
